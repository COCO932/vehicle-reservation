<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahrzeug Reservation</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: #e7dfcf;
      color: #2f2a22;
    }

    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #e7dfcf;
    }

    .login-box {
      background: #fffaf0;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      width: 320px;
      border: 1px solid #d7c7a6;
    }

    .login-box h2 {
      margin-top: 0;
      color: #2f5f2f;
    }

    .login-box input {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      border: 1px solid #cbb98f;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }

    .login-box button {
      width: 100%;
      margin-top: 15px;
      padding: 13px;
      background: #2f5f2f;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #calendar-container {
      display: none;
      padding: 18px;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #2f5f2f;
      margin-bottom: 20px;
    }

    #calendar {
      background: #fffaf0;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid #d7c7a6;
      box-shadow: 0 12px 35px rgba(0,0,0,0.16);
    }

    .fc {
      font-family: Georgia, "Times New Roman", serif;
    }

    .fc .fc-toolbar-title {
      font-size: 24px;
      color: #3b3428;
    }

    .fc .fc-button {
      background: #efe2c5 !important;
      color: #2f2a22 !important;
      border: 1px solid #cdbb93 !important;
      border-radius: 12px !important;
      box-shadow: none !important;
      padding: 8px 12px !important;
    }

    .fc .fc-button-active {
      background: #d8c395 !important;
    }

    .fc-theme-standard .fc-scrollgrid,
    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: #e2d3b4 !important;
    }

    .fc-col-header-cell {
      background: #f3e7cb;
      padding: 8px 0;
    }

    .fc-col-header-cell-cushion {
      color: #3b3428;
      text-decoration: none;
      font-weight: bold;
    }

    .fc-daygrid-day {
      background: #fffdf7;
    }

    .fc-daygrid-day-number {
      color: #5a4b35;
      text-decoration: none;
      font-weight: bold;
      padding: 8px;
    }

    .fc-day-today {
      background: #fff0bd !important;
    }

    .fc-event {
      border: none !important;
      border-radius: 12px !important;
      padding: 5px 7px !important;
      font-size: 13px !important;
      font-weight: bold;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      margin: 3px;
    }

    .fc-event-title,
    .fc-event-time {
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #fffaf0;
      padding: 25px;
      width: 420px;
      max-width: 90%;
      border-radius: 18px;
      border: 1px solid #d7c7a6;
      box-shadow: 0 12px 35px rgba(0,0,0,0.3);
    }

    .modal-content h2 {
      margin-top: 0;
      color: #2f5f2f;
    }

    .modal-content label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #cbb98f;
      box-sizing: border-box;
      font-size: 16px;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      margin-top: 22px;
      gap: 10px;
    }

    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-save {
      background: #2f5f2f;
      color: white;
    }

    .btn-cancel {
      background: #d6c7a8;
    }

    @media (max-width: 700px) {
      #calendar-container {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      #calendar {
        padding: 10px;
        border-radius: 16px;
      }

      .fc .fc-toolbar {
        flex-direction: column;
        gap: 8px;
      }

      .fc .fc-toolbar-title {
        font-size: 20px;
      }

      .fc .fc-button {
        font-size: 13px !important;
        padding: 7px 9px !important;
      }

      .fc-daygrid-day {
        min-height: 85px;
      }
    }
  </style>
</head>

<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h2>Geschützter Zugang</h2>
      <p>Bitte Passwort eingeben:</p>
      <input type="password" id="passwordInput" placeholder="Passwort">
      <button onclick="checkPassword()">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>
  </div>

  <div id="calendar-container">
    <h1>Agenda für Fahrzeuge ER</h1>
    <div id="calendar"></div>
  </div>

  <div class="modal" id="reservationModal">
    <div class="modal-content">
      <h2>Neue Reservation</h2>

      <label>Start</label>
      <input type="datetime-local" id="startDate">

      <label>Ende</label>
      <input type="datetime-local" id="endDate">

      <label>Name</label>
      <input type="text" id="personName" placeholder="Vorname Nachname">

      <label>Telefon</label>
      <input type="text" id="phoneNumber" placeholder="Telefonnummer">

      <label>Fahrzeug</label>
      <select id="vehicleSelect"></select>

      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-save" onclick="saveReservation()">Speichern</button>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = "Fz2_2026!";
    let calendar;

    const vehicles = [
      { name: 'M113 001', color: '#ff4d4d' },
      { name: 'M113 002', color: '#4d79ff' },
      { name: 'M113 003', color: '#33cc33' },
      { name: 'M113 004', color: '#ff66cc' },
      { name: 'M113 401', color: '#00b894' },
      { name: 'M113 402', color: '#fdcb6e' },
      { name: 'Relais 434', color: '#6c5ce7' },
      { name: 'Relais 435', color: '#0984e3' },
      { name: 'Relais 436', color: '#00cec9' },
      { name: 'Relais 437', color: '#e17055' },
      { name: 'Duro 423 Zelt/Tente', color: '#8e44ad' },
      { name: 'Duro 422 Mat FhrSt/Echl cond', color: '#2d3436' },
      { name: 'DURO 412 Mat Mob KP', color: '#16a085' },
      { name: 'MBG300 411', color: '#f39c12' },
      { name: 'MBG300 421', color: '#d35400' },
      { name: 'MBG300 431', color: '#27ae60' },
      { name: 'MBG300 451', color: '#2980b9' },
      { name: 'DURO 404 Trp', color: '#7f8c8d' },
      { name: 'DURO 405 Trp', color: '#c0392b' }
    ];

    const vehicleSelect = document.getElementById('vehicleSelect');

    vehicles.forEach(vehicle => {
      const option = document.createElement('option');
      option.value = vehicle.name;
      option.textContent = vehicle.name;
      vehicleSelect.appendChild(option);
    });

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('loginError');

      if (input === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('calendar-container').style.display = 'block';

        if (!calendar) {
          initCalendar();
        } else {
          calendar.updateSize();
        }
      } else {
        error.textContent = 'Falsches Passwort!';
      }
    }

    function initCalendar() {
      const calendarEl = document.getElementById('calendar');

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: window.innerWidth < 700 ? 'dayGridMonth' : 'dayGridMonth',
        locale: 'de',
        firstDay: 1,
        height: 'auto',
        selectable: true,
        longPressDelay: 100,
        selectLongPressDelay: 100,
        eventLongPressDelay: 100,

        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },

        buttonText: {
          today: 'Heute',
          month: 'Monat',
          week: 'Woche',
          day: 'Tag'
        },

        dateClick: function(info) {
          const startDate = new Date(info.date);
          startDate.setHours(8, 0, 0, 0);

          const endDate = new Date(startDate);
          endDate.setHours(17, 0, 0, 0);

          openModal(startDate, endDate);
        },

        select: function(info) {
          const startDate = new Date(info.start);
          startDate.setHours(8, 0, 0, 0);

          const endDate = new Date(info.end);
          endDate.setHours(17, 0, 0, 0);

          openModal(startDate, endDate);
        },

        eventClick: function(info) {
          const event = info.event;

          alert(
            'Fahrzeug: ' + event.title + '\n' +
            'Reserviert von: ' + event.extendedProps.person + '\n' +
            'Telefon: ' + event.extendedProps.phone + '\n' +
            'Von: ' + event.start.toLocaleString() + '\n' +
            'Bis: ' + event.end.toLocaleString()
          );
        },

        events: JSON.parse(localStorage.getItem('vehicleReservations')) || []
      });

      calendar.render();
    }

    function openModal(start, end) {
      document.getElementById('startDate').value = formatDateForInput(start);
      document.getElementById('endDate').value = formatDateForInput(end);
      document.getElementById('reservationModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('reservationModal').style.display = 'none';
      document.getElementById('personName').value = '';
      document.getElementById('phoneNumber').value = '';
    }

    function formatDateForInput(date) {
      const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return localDate.toISOString().slice(0,16);
    }

    function saveReservation() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      const person = document.getElementById('personName').value;
      const phone = document.getElementById('phoneNumber').value;
      const vehicle = document.getElementById('vehicleSelect').value;

      if (!start || !end || !person || !phone || !vehicle) {
        alert('Bitte alle Felder ausfüllen!');
        return;
      }

      const vehicleData = vehicles.find(v => v.name === vehicle);

      const newEvent = {
        title: vehicle,
        start: start,
        end: end,
        color: vehicleData.color,
        extendedProps: {
          person: person,
          phone: phone
        }
      };

      calendar.addEvent(newEvent);

      const savedEvents = JSON.parse(localStorage.getItem('vehicleReservations')) || [];
      savedEvents.push(newEvent);
      localStorage.setItem('vehicleReservations', JSON.stringify(savedEvents));

      closeModal();
    }

    window.onclick = function(event) {
      const modal = document.getElementById('reservationModal');
      if (event.target === modal) {
        closeModal();
      }
    }
  </script>
</body>
</html>
