<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahrzeug Reservation</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #e9e2d3, #f7f4ec);
      color: #242424;
    }

    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #e6dfcf, #f8f5ed);
    }

    .login-box {
      background: rgba(255,255,255,0.88);
      padding: 30px;
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.14);
      width: 320px;
      border: 1px solid rgba(220,205,170,0.8);
      backdrop-filter: blur(8px);
    }

    .login-box h2 {
      margin-top: 0;
      color: #245c36;
      letter-spacing: -0.4px;
    }

    .login-box input {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      border: 1px solid #cbb98f;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    .login-box button {
      width: 100%;
      margin-top: 15px;
      padding: 13px;
      background: #245c36;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      font-weight: 700;
    }

    #calendar-container {
      display: none;
      padding: 18px;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #245c36;
      margin-bottom: 20px;
      font-weight: 800;
      letter-spacing: -0.8px;
    }

    #calendar {
      background: rgba(255,255,255,0.82);
      padding: 18px;
      border-radius: 26px;
      border: 1px solid rgba(217,199,156,0.9);
      box-shadow: 0 18px 45px rgba(0,0,0,0.13);
      backdrop-filter: blur(8px);
    }

    .fc {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    .fc .fc-toolbar-title {
      font-size: 24px;
      color: #242424;
      font-weight: 800;
      letter-spacing: -0.7px;
    }

    .fc .fc-button {
      background: #f3ead7 !important;
      color: #2b2b2b !important;
      border: 1px solid #d5c49e !important;
      border-radius: 14px !important;
      box-shadow: none !important;
      padding: 8px 13px !important;
      font-weight: 700 !important;
      font-family: inherit !important;
    }

    .fc .fc-button-active {
      background: #245c36 !important;
      color: white !important;
      border-color: #245c36 !important;
    }

    .fc-theme-standard .fc-scrollgrid,
    .fc-theme-standard td,
    .fc-theme-standard th {
      border-color: #e2d3b4 !important;
    }

    .fc-col-header-cell {
      background: #f3e7cb;
      padding: 8px 0;
    }

    .fc-col-header-cell-cushion {
      color: #333;
      text-decoration: none;
      font-weight: 800;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .fc-daygrid-day {
      background: rgba(255,253,247,0.9);
    }

    .fc-daygrid-day-number {
      color: #51452f;
      text-decoration: none;
      font-weight: 800;
      padding: 8px;
    }

    .fc-day-today {
      background: #fff0bd !important;
    }

    .fc-event {
      border: none !important;
      border-radius: 14px !important;
      padding: 6px 8px !important;
      font-size: 13px !important;
      font-weight: 800;
      box-shadow: 0 5px 12px rgba(0,0,0,0.18);
      margin: 3px;
      cursor: pointer;
    }

    .fc-event-title,
    .fc-event-time {
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.48);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      width: 420px;
      max-width: 90%;
      border-radius: 22px;
      border: 1px solid rgba(217,199,156,0.9);
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    .modal-content h2 {
      margin-top: 0;
      color: #245c36;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .modal-content label {
      display: block;
      margin-top: 12px;
      font-weight: 800;
      font-size: 14px;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 12px;
      border: 1px solid #cbb98f;
      box-sizing: border-box;
      font-size: 16px;
      font-family: inherit;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      margin-top: 22px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 11px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-family: inherit;
      font-weight: 800;
    }

    .btn-save {
      background: #245c36;
      color: white;
    }

    .btn-cancel {
      background: #e3d6ba;
      color: #2b2b2b;
    }

    .btn-delete {
      background: #b42318;
      color: white;
      margin-right: auto;
    }

    .reservation-info {
      background: #f8f4ea;
      border: 1px solid #e2d3b4;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.5;
      font-size: 15px;
    }

    @media (max-width: 700px) {
      #calendar-container {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      #calendar {
        padding: 10px;
        border-radius: 18px;
      }

      .fc .fc-toolbar {
        flex-direction: column;
        gap: 8px;
      }

      .fc .fc-toolbar-title {
        font-size: 20px;
      }

      .fc .fc-button {
        font-size: 13px !important;
        padding: 7px 9px !important;
      }

      .fc-daygrid-day {
        min-height: 85px;
      }
    }
  </style>
</head>

<body>

  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h2>Geschützter Zugang</h2>
      <p>Bitte Passwort eingeben:</p>
      <input type="password" id="passwordInput" placeholder="Passwort">
      <button onclick="checkPassword()">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>
  </div>

  <div id="calendar-container">
    <h1>Agenda für Fahrzeuge ER</h1>
    <div id="calendar"></div>
  </div>

  <div class="modal" id="reservationModal">
    <div class="modal-content">
      <h2>Neue Reservation</h2>

      <label>Start</label>
      <input type="datetime-local" id="startDate">

      <label>Ende</label>
      <input type="datetime-local" id="endDate">

      <label>Name</label>
      <input type="text" id="personName" placeholder="Vorname Nachname">

      <label>Telefon</label>
      <input type="text" id="phoneNumber" placeholder="Telefonnummer">

      <label>Fahrzeug</label>
      <select id="vehicleSelect"></select>

      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-save" onclick="saveReservation()">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal" id="eventModal">
    <div class="modal-content">
      <h2>Reservation</h2>

      <div class="reservation-info" id="eventInfo"></div>

      <div class="modal-buttons">
        <button class="btn btn-delete" onclick="deleteSelectedReservation()">Löschen</button>
        <button class="btn btn-cancel" onclick="closeEventModal()">Schliessen</button>
      </div>
    </div>
  </div>

  <script>
    const PASSWORD = "Fz2_2026!";
    let calendar;
    let selectedEvent = null;

    const vehicles = [
      { name: 'M113 001', color: '#ff4d4d' },
      { name: 'M113 002', color: '#4d79ff' },
      { name: 'M113 003', color: '#33cc33' },
      { name: 'M113 004', color: '#ff66cc' },
      { name: 'M113 401', color: '#00b894' },
      { name: 'M113 402', color: '#fdcb6e' },
      { name: 'Relais 434', color: '#6c5ce7' },
      { name: 'Relais 435', color: '#0984e3' },
      { name: 'Relais 436', color: '#00cec9' },
      { name: 'Relais 437', color: '#e17055' },
      { name: 'Duro 423 Zelt/Tente', color: '#8e44ad' },
      { name: 'Duro 422 Mat FhrSt/Echl cond', color: '#2d3436' },
      { name: 'DURO 412 Mat Mob KP', color: '#16a085' },
      { name: 'MBG300 411', color: '#f39c12' },
      { name: 'MBG300 421', color: '#d35400' },
      { name: 'MBG300 431', color: '#27ae60' },
      { name: 'MBG300 451', color: '#2980b9' },
      { name: 'DURO 404 Trp', color: '#7f8c8d' },
      { name: 'DURO 405 Trp', color: '#c0392b' }
    ];

    const vehicleSelect = document.getElementById('vehicleSelect');

    vehicles.forEach(vehicle => {
      const option = document.createElement('option');
      option.value = vehicle.name;
      option.textContent = vehicle.name;
      vehicleSelect.appendChild(option);
    });

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('loginError');

      if (input === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('calendar-container').style.display = 'block';

        if (!calendar) {
          initCalendar();
        } else {
          calendar.updateSize();
        }
      } else {
        error.textContent = 'Falsches Passwort!';
      }
    }

    function initCalendar() {
      const calendarEl = document.getElementById('calendar');

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'de',
        firstDay: 1,
        height: 'auto',
        selectable: true,
        longPressDelay: 100,
        selectLongPressDelay: 100,
        eventLongPressDelay: 100,

        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },

        buttonText: {
          today: 'Heute',
          month: 'Monat',
          week: 'Woche',
          day: 'Tag'
        },

        dateClick: function(info) {
          const startDate = new Date(info.date);
          startDate.setHours(8, 0, 0, 0);

          const endDate = new Date(startDate);
          endDate.setHours(17, 0, 0, 0);

          openModal(startDate, endDate);
        },

        select: function(info) {
          const startDate = new Date(info.start);
          startDate.setHours(8, 0, 0, 0);

          const endDate = new Date(info.end);
          endDate.setHours(17, 0, 0, 0);

          openModal(startDate, endDate);
        },

        eventClick: function(info) {
          selectedEvent = info.event;

          document.getElementById('eventInfo').innerHTML =
            '<strong>Fahrzeug:</strong> ' + selectedEvent.title + '<br>' +
            '<strong>Reserviert von:</strong> ' + selectedEvent.extendedProps.person + '<br>' +
            '<strong>Telefon:</strong> ' + selectedEvent.extendedProps.phone + '<br>' +
            '<strong>Von:</strong> ' + selectedEvent.start.toLocaleString() + '<br>' +
            '<strong>Bis:</strong> ' + selectedEvent.end.toLocaleString();

          document.getElementById('eventModal').style.display = 'flex';
        },

        events: JSON.parse(localStorage.getItem('vehicleReservations')) || []
      });

      calendar.render();
    }

    function openModal(start, end) {
      document.getElementById('startDate').value = formatDateForInput(start);
      document.getElementById('endDate').value = formatDateForInput(end);
      document.getElementById('reservationModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('reservationModal').style.display = 'none';
      document.getElementById('personName').value = '';
      document.getElementById('phoneNumber').value = '';
    }

    function closeEventModal() {
      document.getElementById('eventModal').style.display = 'none';
      selectedEvent = null;
    }

    function formatDateForInput(date) {
      const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return localDate.toISOString().slice(0,16);
    }

    function createEventId() {
      return 'res-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
    }

    function saveReservation() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      const person = document.getElementById('personName').value;
      const phone = document.getElementById('phoneNumber').value;
      const vehicle = document.getElementById('vehicleSelect').value;

      if (!start || !end || !person || !phone || !vehicle) {
        alert('Bitte alle Felder ausfüllen!');
        return;
      }

      const vehicleData = vehicles.find(v => v.name === vehicle);

      const newEvent = {
        id: createEventId(),
        title: vehicle,
        start: start,
        end: end,
        color: vehicleData.color,
        extendedProps: {
          person: person,
          phone: phone
        }
      };

      calendar.addEvent(newEvent);

      const savedEvents = JSON.parse(localStorage.getItem('vehicleReservations')) || [];
      savedEvents.push(newEvent);
      localStorage.setItem('vehicleReservations', JSON.stringify(savedEvents));

      closeModal();
    }

    function deleteSelectedReservation() {
      if (!selectedEvent) return;

      const confirmDelete = confirm('Möchtest du diese Reservation wirklich löschen?');

      if (!confirmDelete) return;

      const eventId = selectedEvent.id;

      selectedEvent.remove();

      const savedEvents = JSON.parse(localStorage.getItem('vehicleReservations')) || [];
      const updatedEvents = savedEvents.filter(event => event.id !== eventId);
      localStorage.setItem('vehicleReservations', JSON.stringify(updatedEvents));

      closeEventModal();
    }

    window.onclick = function(event) {
      const reservationModal = document.getElementById('reservationModal');
      const eventModal = document.getElementById('eventModal');

      if (event.target === reservationModal) {
        closeModal();
      }

      if (event.target === eventModal) {
        closeEventModal();
      }
    }
  </script>
</body>
</html>
