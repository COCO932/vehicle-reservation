<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fahrzeug Reservation</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #e9ecef;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
    }

    .login-box h2 {
      margin-top: 0;
      color: #1f5f1f;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .login-box button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #1f5f1f;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .login-box button:hover {
      background: #2d7a2d;
    }

    #calendar-container {
      display: none;
      padding: 20px;
    }

    h1 {
      color: #1f5f1f;
    }

    #calendar {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .modal-content h2 {
      margin-top: 0;
      color: #1f5f1f;
    }

    .modal-content label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 10px;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-save {
      background: #1f5f1f;
      color: white;
    }

    .btn-cancel {
      background: #ccc;
    }

    .fc-event {
      border: none !important;
      padding: 2px 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h2>Geschützter Zugang</h2>
      <p>Bitte Passwort eingeben:</p>
      <input type="password" id="passwordInput" placeholder="Passwort">
      <button onclick="checkPassword()">Login</button>
      <p id="loginError" style="color:red;"></p>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="calendar-container">
    <h1>Agenda für Fahrzeuge ER</h1>
    <div id="calendar"></div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="reservationModal">
    <div class="modal-content">
      <h2>Neue Reservation</h2>

      <label>Start</label>
      <input type="datetime-local" id="startDate">

      <label>Ende</label>
      <input type="datetime-local" id="endDate">

      <label>Name</label>
      <input type="text" id="personName" placeholder="Vorname Nachname">

      <label>Telefon</label>
      <input type="text" id="phoneNumber" placeholder="Telefonnummer">

      <label>Fahrzeug</label>
      <select id="vehicleSelect"></select>

      <div class="modal-buttons">
        <button class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-save" onclick="saveReservation()">Speichern</button>
      </div>
    </div>
  </div>

  <script>

    // PASSWORT
    const PASSWORD = "Fz2_2026!";

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const error = document.getElementById('loginError');

      if (input === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('calendar-container').style.display = 'block';
      } else {
        error.textContent = 'Falsches Passwort!';
      }
    }

    // Fahrzeuge + Farben
    const vehicles = [
      { name: 'M113 001', color: '#ff4d4d' },
      { name: 'M113 002', color: '#4d79ff' },
      { name: 'M113 003', color: '#33cc33' },
      { name: 'M113 004', color: '#ff66cc' },
      { name: 'M113 401', color: '#00b894' },
      { name: 'M113 402', color: '#fdcb6e' },
      { name: 'Relais 434', color: '#6c5ce7' },
      { name: 'Relais 435', color: '#0984e3' },
      { name: 'Relais 436', color: '#00cec9' },
      { name: 'Relais 437', color: '#e17055' },
      { name: 'Duro 423 Zelt/Tente', color: '#8e44ad' },
      { name: 'Duro 422 Mat FhrSt/Echl cond', color: '#2d3436' },
      { name: 'DURO 412 Mat Mob KP', color: '#16a085' },
      { name: 'MBG300 411', color: '#f39c12' },
      { name: 'MBG300 421', color: '#d35400' },
      { name: 'MBG300 431', color: '#27ae60' },
      { name: 'MBG300 451', color: '#2980b9' },
      { name: 'DURO 404 Trp', color: '#7f8c8d' },
      { name: 'DURO 405 Trp', color: '#c0392b' }
    ];

    // Dropdown füllen
    const vehicleSelect = document.getElementById('vehicleSelect');

    vehicles.forEach(vehicle => {
      const option = document.createElement('option');
      option.value = vehicle.name;
      option.textContent = vehicle.name;
      vehicleSelect.appendChild(option);
    });

    let selectedStart = null;
    let selectedEnd = null;
    let calendar;

    document.addEventListener('DOMContentLoaded', function () {

      const calendarEl = document.getElementById('calendar');

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'de',
        firstDay: 1,
        selectable: true,
        editable: false,
        height: 'auto',
        slotMinTime: '00:00:00',
        slotMaxTime: '24:00:00',
        nowIndicator: true,
        allDaySlot: false,

        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'timeGridWeek,timeGridDay'
        },

        select: function(info) {
          openModal(info.startStr, info.endStr);
        },

        eventClick: function(info) {
          const event = info.event;

          alert(
            'Fahrzeug: ' + event.title + '\n' +
            'Reserviert von: ' + event.extendedProps.person + '\n' +
            'Telefon: ' + event.extendedProps.phone + '\n' +
            'Von: ' + event.start.toLocaleString() + '\n' +
            'Bis: ' + event.end.toLocaleString()
          );
        },

        events: JSON.parse(localStorage.getItem('vehicleReservations')) || []
      });

      calendar.render();
    });

    function openModal(start, end) {
      selectedStart = start;
      selectedEnd = end;

      document.getElementById('startDate').value = formatDateForInput(start);
      document.getElementById('endDate').value = formatDateForInput(end);

      document.getElementById('reservationModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('reservationModal').style.display = 'none';

      document.getElementById('personName').value = '';
      document.getElementById('phoneNumber').value = '';
    }

    function formatDateForInput(dateString) {
      const date = new Date(dateString);
      const offset = date.getTimezoneOffset();
      const localDate = new Date(date.getTime() - offset * 60000);
      return localDate.toISOString().slice(0,16);
    }

    function saveReservation() {

      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      const person = document.getElementById('personName').value;
      const phone = document.getElementById('phoneNumber').value;
      const vehicle = document.getElementById('vehicleSelect').value;

      if (!person || !phone) {
        alert('Bitte alle Felder ausfüllen!');
        return;
      }

      const vehicleData = vehicles.find(v => v.name === vehicle);

      const newEvent = {
        title: vehicle,
        start: start,
        end: end,
        color: vehicleData.color,
        extendedProps: {
          person: person,
          phone: phone
        }
      };

      // Im Kalender anzeigen
      calendar.addEvent(newEvent);

      // Im LocalStorage speichern
      const savedEvents = JSON.parse(localStorage.getItem('vehicleReservations')) || [];
      savedEvents.push(newEvent);
      localStorage.setItem('vehicleReservations', JSON.stringify(savedEvents));

      closeModal();
    }

    // Modal schließen wenn außerhalb geklickt wird
    window.onclick = function(event) {
      const modal = document.getElementById('reservationModal');
      if (event.target === modal) {
        closeModal();
      }
    }

  </script>
</body>
</html>
